services:
  postgres:
    image: postgres:16-alpine
    container_name: esco-saas-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: esco
      POSTGRES_PASSWORD: esco
      POSTGRES_DB: esco_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
